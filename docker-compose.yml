services:

  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    container_name: divayshakati-api
    restart: unless-stopped
    environment:
      PORT: "3001"
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET}
    expose:
      - "3001"

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
      args:
        EXPO_PUBLIC_DOMAIN: ${DOMAIN}
    container_name: divayshakati-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
